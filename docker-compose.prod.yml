services:
  traefik:
    image: traefik:v3.6
    container_name: cesizen-traefik-prod
    restart: unless-stopped
    command:
      - --configFile=/etc/traefik/traefik.yml
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.web.http.redirections.entrypoint.permanent=true
      - --certificatesresolvers.letsencrypt.acme.httpchallenge=true
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./traefik:/etc/traefik:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt_data:/letsencrypt
    networks:
      - internal

  postgres:
    image: postgres:16-alpine
    container_name: cesizen-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - internal

  migrate:
    image: ${BACKAPI_IMAGE:-ghcr.io/boromain/cesizen-backapi:latest}
    container_name: cesizen-migrate-prod
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "npx prisma migrate deploy && npm run seed-dist"
    networks:
      - internal
    restart: "no"

  uptime-kuma:
    image: louislam/uptime-kuma:latest
    container_name: uptime-kuma
    ports:
      - "3001:3001"
    volumes:
      - uptime-kuma:/app/data
    restart: always

  backapi:
    image: ${BACKAPI_IMAGE:-ghcr.io/boromain/cesizen-backapi:latest}
    container_name: cesizen-backapi-prod
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      ACCESS_SECRET: ${ACCESS_SECRET}
      REFRESH_SECRET: ${REFRESH_SECRET}
    depends_on:
      migrate:
        condition: service_completed_successfully
    labels:
      - traefik.enable=true
      - traefik.http.routers.cesizen-backapi-secure.rule=Host(`api.cesizen-romainb.duckdns.org`)
      - traefik.http.routers.cesizen-backapi-secure.entrypoints=websecure
      - traefik.http.routers.cesizen-backapi-secure.service=cesizen-backapi
      - traefik.http.routers.cesizen-backapi-secure.tls=true
      - traefik.http.routers.cesizen-backapi-secure.tls.certresolver=letsencrypt
      - traefik.http.services.cesizen-backapi.loadbalancer.server.port=3000
    command: node dist/src/app.js
    networks:
      - internal

  admin-panel:
    image: ${ADMIN_PANEL_IMAGE:-ghcr.io/boromain/cesizen-admin-panel:latest}
    container_name: cesizen-admin-panel-prod
    restart: unless-stopped
    environment:
      VITE_API_URL: https://api.cesizen-romainb.duckdns.org
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5173 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    labels:
      - traefik.enable=true
      - traefik.http.routers.cesizen-admin-panel-secure.rule=Host(`admin.cesizen-romainb.duckdns.org`)
      - traefik.http.routers.cesizen-admin-panel-secure.entrypoints=websecure
      - traefik.http.routers.cesizen-admin-panel-secure.service=cesizen-admin-panel
      - traefik.http.routers.cesizen-admin-panel-secure.tls=true
      - traefik.http.routers.cesizen-admin-panel-secure.tls.certresolver=letsencrypt
      - traefik.http.services.cesizen-admin-panel.loadbalancer.server.port=5173
    networks:
      - internal

volumes:
  postgres_data:
  letsencrypt_data:
  uptime-kuma:

networks:
  internal:
