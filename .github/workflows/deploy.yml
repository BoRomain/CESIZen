name: Deploy to Azure VM via GHCR

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: boromain
jobs:
  lint:
    name: Lint ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: BackAPI
            path: BackAPI
          - service: admin-panel
            path: admin-panel

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ matrix.path }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.path }}
        run: npm ci

      - name: Run lint
        working-directory: ${{ matrix.path }}
        run: npm run lint

  audit:
    name: Audit ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: BackAPI
            path: BackAPI
          - service: admin-panel
            path: admin-panel

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ matrix.path }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.path }}
        run: npm ci

      - name: Run npm audit
        working-directory: ${{ matrix.path }}
        run: npm audit --audit-level=high --omit=dev

  build-and-push:
    name: Build and push ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backapi
            context: ./BackAPI
            dockerfile: ./BackAPI/Dockerfile
            image_suffix: cesizen-backapi
            build_args: ""
          - name: admin-panel
            context: ./admin-panel
            dockerfile: ./admin-panel/Dockerfile
            image_suffix: cesizen-admin-panel
            build_args: |
              VITE_API_URL=https://api.cesizen.com
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/boromain/${{ matrix.image_suffix }}
          tags: |
            type=raw,value=latest
            type=ref,event=branch
            type=sha,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          build-args: ${{ matrix.build_args }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set image SHA output
        id: vars
        run: |
          # The metadata action generates tags including the SHA tag
          # We'll use the first SHA tag (short format) as our image version
          echo "tags=${{ steps.meta.outputs.tags }}"
          # Convert tags string to array and find the SHA tag (7 hex chars)
          IFS=',' read -ra TAG_ARRAY <<< "${{ steps.meta.outputs.tags }}"
          for tag in "${TAG_ARRAY[@]}"; do
            if [[ "$tag" =~ ^[a-f0-9]{7}$ ]]; then
              echo "SHA_TAG=$tag" >> $GITHUB_OUTPUT
              break
            fi
          done
          # Fallback: if no SHA tag found, use the short SHA from git
          if [ -z "$SHA_TAG" ]; then
            echo "SHA_TAG=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          fi

  deploy:
    needs: [lint, audit, build-and-push]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve image tags
        id: tags
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "SHORT_SHA=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "BACKAPI_IMAGE=ghcr.io/boromain/cesizen-backapi:sha-${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "ADMIN_PANEL_IMAGE=ghcr.io/boromain/cesizen-admin-panel:sha-${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Prepare SSH access
        env:
          VM_HOST: ${{ secrets.AZURE_VM_HOST }}
          VM_USER: ${{ secrets.AZURE_VM_USER }}
          VM_PORT: ${{ secrets.AZURE_VM_PORT || '22' }}
        run: |
          set -euo pipefail
          if [[ -z "${VM_HOST}" || -z "${VM_USER}" ]]; then
            echo "AZURE_VM_HOST and AZURE_VM_USER secrets are required." >&2
            exit 1
          fi
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s' "${{ secrets.AZURE_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p "${VM_PORT}" "${VM_HOST}" >> ~/.ssh/known_hosts

      - name: Sync Compose file to the VM
        env:
          VM_HOST: ${{ secrets.AZURE_VM_HOST }}
          VM_USER: ${{ secrets.AZURE_VM_USER }}
          VM_PORT: ${{ secrets.AZURE_VM_PORT || '22' }}
          VM_APP_DIR: ${{ secrets.AZURE_APP_DIR || '' }}
        run: |
          set -euo pipefail
          REMOTE_HOME="$(ssh -i ~/.ssh/id_rsa -p "${VM_PORT}" "${VM_USER}@${VM_HOST}" 'printf %s "$HOME"')"
          APP_DIR="${VM_APP_DIR:-${REMOTE_HOME}/CESIZen}"
          ssh -i ~/.ssh/id_rsa -p "${VM_PORT}" "${VM_USER}@${VM_HOST}" "mkdir -p '${APP_DIR}'"
          rsync -az \
            -e "ssh -i ~/.ssh/id_rsa -p ${VM_PORT} -o StrictHostKeyChecking=accept-new" \
            ./docker-compose.prod.yml "${VM_USER}@${VM_HOST}:${APP_DIR}/"

      - name: Deploy images on Azure VM
        env:
          VM_HOST: ${{ secrets.AZURE_VM_HOST }}
          VM_USER: ${{ secrets.AZURE_VM_USER }}
          VM_PORT: ${{ secrets.AZURE_VM_PORT || '22' }}
          VM_APP_DIR: ${{ secrets.AZURE_APP_DIR || '' }}
          BACKAPI_IMAGE: ${{ steps.tags.outputs.BACKAPI_IMAGE }}
          ADMIN_PANEL_IMAGE: ${{ steps.tags.outputs.ADMIN_PANEL_IMAGE }}
          LETSENCRYPT_EMAIL: ${{ secrets.LETSENCRYPT_EMAIL }}
        run: |
          set -euo pipefail
          REMOTE_HOME="$(ssh -i ~/.ssh/id_rsa -p "${VM_PORT}" "${VM_USER}@${VM_HOST}" 'printf %s "$HOME"')"
          APP_DIR="${VM_APP_DIR:-${REMOTE_HOME}/CESIZen}"

          ssh -i ~/.ssh/id_rsa -p "${VM_PORT}" "${VM_USER}@${VM_HOST}" "
            cd '${APP_DIR}' && \
            echo '${{ secrets.GITHUB_TOKEN }}' | docker login ghcr.io -u ${{ github.actor }} --password-stdin && \
            export BACKAPI_IMAGE='${BACKAPI_IMAGE}' && \
            export ADMIN_PANEL_IMAGE='${ADMIN_PANEL_IMAGE}' && \
            export LETSENCRYPT_EMAIL='${LETSENCRYPT_EMAIL}' && \
            docker compose -f docker-compose.prod.yml --env-file .env config && \
            docker compose -f docker-compose.prod.yml --env-file .env pull backapi admin-panel && \
            docker compose -f docker-compose.prod.yml --env-file .env up -d --remove-orphans && \
            docker image prune -f
          "
