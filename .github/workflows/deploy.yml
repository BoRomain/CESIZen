name: Deploy to Azure VM via GHCR

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Permet d'écrire l'image dans GitHub Packages (GHCR)
permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backapi
            context: ./BackAPI
            dockerfile: ./BackAPI/Dockerfile
            image_suffix: cesizen-backapi
            build_args: ""
          - name: admin-panel
            context: ./admin-panel
            dockerfile: ./admin-panel/Dockerfile
            image_suffix: cesizen-admin-panel
            build_args: |
              VITE_API_URL=http://api.localhost
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/boromain/${{ matrix.image_suffix }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          build-args: ${{ matrix.build_args }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    env:
      AZURE_VM_HOST: ${{ secrets.AZURE_VM_HOST }}
      AZURE_VM_USER: ${{ secrets.AZURE_VM_USER }}
      AZURE_VM_PORT: ${{ secrets.AZURE_VM_PORT }}
      AZURE_APP_DIR: ${{ secrets.AZURE_APP_DIR }}
    steps:
      - name: Checkout repository (Uniquement pour récupérer le docker-compose.prod.yml)
        uses: actions/checkout@v4

      - name: Prepare SSH access
        run: |
          set -euo pipefail
          HOST="${AZURE_VM_HOST:?AZURE_VM_HOST secret is required}"
          PORT="${AZURE_VM_PORT:-22}"

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.AZURE_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p "$PORT" -H "$HOST" >> ~/.ssh/known_hosts

      - name: Sync Compose file and .env to the VM
        run: |
          set -euo pipefail
          HOST="${AZURE_VM_HOST:?AZURE_VM_HOST secret is required}"
          USER="${AZURE_VM_USER:?AZURE_VM_USER secret is required}"
          PORT="${AZURE_VM_PORT:-22}"
          REMOTE_HOME="$(ssh -i ~/.ssh/id_rsa -p "$PORT" "${USER}@${HOST}" 'printf %s "$HOME"')"
          APP_DIR="${AZURE_APP_DIR:-${REMOTE_HOME}/CESIZen}"

          ssh -i ~/.ssh/id_rsa -p "$PORT" "${USER}@${HOST}" "
            set -euo pipefail
            if ! mkdir -p '${APP_DIR}' 2>/dev/null; then
              echo 'AZURE_APP_DIR must be writable by the SSH user. Use a path like ${REMOTE_HOME}/CESIZen or grant access to the configured directory.' >&2
              exit 1
            fi
          "

          rsync -az \
            -e "ssh -i ~/.ssh/id_rsa -p ${PORT}" \
            ./docker-compose.prod.yml "${USER}@${HOST}:${APP_DIR}/"

      - name: Deploy Image on Azure VM
        run: |
          set -euo pipefail
          HOST="${AZURE_VM_HOST:?AZURE_VM_HOST secret is required}"
          USER="${AZURE_VM_USER:?AZURE_VM_USER secret is required}"
          PORT="${AZURE_VM_PORT:-22}"
          REMOTE_HOME="$(ssh -i ~/.ssh/id_rsa -p "$PORT" "${USER}@${HOST}" 'printf %s "$HOME"')"
          APP_DIR="${AZURE_APP_DIR:-${REMOTE_HOME}/CESIZen}"

          ssh -i ~/.ssh/id_rsa -p "$PORT" "${USER}@${HOST}" "
            cd '${APP_DIR}' && \
            echo '${{ secrets.GITHUB_TOKEN }}' | docker login ghcr.io -u ${{ github.actor }} --password-stdin && \
            docker compose -f docker-compose.prod.yml --env-file .env pull && \
            docker compose -f docker-compose.prod.yml --env-file .env up -d --remove-orphans && \
            docker image prune -f
          "
