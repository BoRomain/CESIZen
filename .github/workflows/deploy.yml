name: Deploy to Azure VM via GHCR

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
jobs:
  build-and-push:
    name: Build and push ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backapi
            context: ./BackAPI
            dockerfile: ./BackAPI/Dockerfile
            image_suffix: cesizen-backapi
            build_args: ""
          - name: admin-panel
            context: ./admin-panel
            dockerfile: ./admin-panel/Dockerfile
            image_suffix: cesizen-admin-panel
            build_args: |
              VITE_API_URL=http://api.localhost
    outputs:
      backapi-sha: ${{ steps.vars.outputs.SHA_TAG }}
      admin-panel-sha: ${{ steps.vars.outputs.SHA_TAG }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/boromain/${{ matrix.image_suffix }}
          tags: |
            type=raw,value=latest
            type=ref,event=branch
            type=sha,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          build-args: ${{ matrix.build_args }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set image SHA output
        id: vars
        run: |
          # The metadata action generates tags including the SHA tag
          # We'll use the first SHA tag (short format) as our image version
          echo "tags=${{ steps.meta.outputs.tags }}"
          # Convert tags string to array and find the SHA tag (7 hex chars)
          IFS=',' read -ra TAG_ARRAY <<< "${{ steps.meta.outputs.tags }}"
          for tag in "${TAG_ARRAY[@]}"; do
            if [[ "$tag" =~ ^[a-f0-9]{7}$ ]]; then
              echo "SHA_TAG=$tag" >> $GITHUB_OUTPUT
              break
            fi
          done
          # Fallback: if no SHA tag found, use the short SHA from git
          if [ -z "$SHA_TAG" ]; then
            echo "SHA_TAG=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          fi

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      BACKAPI_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/cesizen-backapi:${{ needs.build-and-push.outputs.backapi-sha }}
      ADMIN_PANEL_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/cesizen-admin-panel:${{ needs.build-and-push.outputs.admin-panel-sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare SSH access
        run: |
          set -euo pipefail

          if [[ -z "${VM_HOST}" || -z "${VM_USER}" ]]; then
            echo "AZURE_VM_HOST and AZURE_VM_USER secrets are required." >&2
            exit 1
          fi

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s' "${{ secrets.AZURE_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p "${VM_PORT}" "${VM_HOST}" >> ~/.ssh/known_hosts

      - name: Sync Compose file to the VM
        run: |
          set -euo pipefail
          HOST="${AZURE_VM_HOST:?AZURE_VM_HOST secret is required}"
          USER="${AZURE_VM_USER:?AZURE_VM_USER secret is required}"
          PORT="${AZURE_VM_PORT:-22}"
          REMOTE_HOME="$(ssh -i ~/.ssh/id_rsa -p "$PORT" "${USER}@${HOST}" 'printf %s "$HOME"')"
          APP_DIR="${AZURE_APP_DIR:-${REMOTE_HOME}/CESIZen}"

          ssh -i ~/.ssh/id_rsa -p "$PORT" "${USER}@${HOST}" "
            set -euo pipefail
            if ! mkdir -p '${APP_DIR}' 2>/dev/null; then
              echo 'AZURE_APP_DIR must be writable by the SSH user. Use a path like ${REMOTE_HOME}/CESIZen or grant access to the configured directory.' >&2
              exit 1
            fi
          "

          rsync -az \
            -e "ssh -i ~/.ssh/id_rsa -p ${VM_PORT} -o StrictHostKeyChecking=accept-new" \
            ./docker-compose.prod.yml "${VM_USER}@${VM_HOST}:${VM_APP_DIR}/"

      - name: Deploy images on Azure VM
        run: |
          set -euo pipefail
          HOST="${AZURE_VM_HOST:?AZURE_VM_HOST secret is required}"
          USER="${AZURE_VM_USER:?AZURE_VM_USER secret is required}"
          PORT="${AZURE_VM_PORT:-22}"
          REMOTE_HOME="$(ssh -i ~/.ssh/id_rsa -p "$PORT" "${USER}@${HOST}" 'printf %s "$HOME"')"
          APP_DIR="${AZURE_APP_DIR:-${REMOTE_HOME}/CESIZen}"

          ssh -i ~/.ssh/id_rsa -p "$PORT" "${USER}@${HOST}" "
            cd '${APP_DIR}' && \
            echo '${{ secrets.GITHUB_TOKEN }}' | docker login ghcr.io -u ${{ github.actor }} --password-stdin && \
            echo \"Deploying BackAPI image: $BACKAPI_IMAGE\" && \
            echo \"Deploying Admin Panel image: $ADMIN_PANEL_IMAGE\" && \
            # Use the specific image tags that were just built and pushed
            BACKAPI_IMAGE=${BACKAPI_IMAGE} ADMIN_PANEL_IMAGE=${ADMIN_PANEL_IMAGE} docker compose -f docker-compose.prod.yml --env-file .env pull && \
            docker compose -f docker-compose.prod.yml --env-file .env up -d --remove-orphans && \
            docker image prune -f
          "
