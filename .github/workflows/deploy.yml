name: CI/CD

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: boromain
  VM_PORT: ${{ secrets.AZURE_VM_PORT || '22' }}
  VM_APP_DIR: ${{ secrets.AZURE_APP_DIR || '' }}

jobs:
  lint:
    name: Lint ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: BackAPI
            path: BackAPI
          - service: admin-panel
            path: admin-panel

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ matrix.path }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.path }}
        run: npm ci

      - name: Run lint
        working-directory: ${{ matrix.path }}
        run: npm run lint

  audit:
    name: Audit ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: BackAPI
            path: BackAPI
          - service: admin-panel
            path: admin-panel

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ matrix.path }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.path }}
        run: npm ci

      - name: Run npm audit
        working-directory: ${{ matrix.path }}
        run: npm audit --audit-level=critical --omit=dev

  unit-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./BackAPI

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: Backapi/package-lock.json

      - name: Installation des dépendances
        run: npm ci

      - name: Exécution des tests Jest
        run: npm test

  build-and-push:
    name: Build and push ${{ matrix.service }}
    needs: [lint, audit, unit-tests]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backapi
            context: ./BackAPI
            dockerfile: ./BackAPI/Dockerfile
            image_suffix: cesizen-backapi
            build_args: ""
          - name: admin-panel
            context: ./admin-panel
            dockerfile: ./admin-panel/Dockerfile
            image_suffix: cesizen-admin-panel
            build_args: |
              VITE_API_URL=https://api.cesizen-romainb.duckdns.org

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image_suffix }}
          tags: |
            type=raw,value=latest
            type=ref,event=branch
            type=sha,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          build-args: ${{ matrix.build_args }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: [build-and-push]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH
        env:
          VM_HOST: ${{ secrets.AZURE_VM_HOST }}
          VM_USER: ${{ secrets.AZURE_VM_USER }}
        run: |
          set -euo pipefail
          if [[ -z "${VM_HOST}" || -z "${VM_USER}" ]]; then
            echo "::error::AZURE_VM_HOST and AZURE_VM_USER secrets are required."
            exit 1
          fi
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s' "${{ secrets.AZURE_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p "${{ env.VM_PORT }}" "${VM_HOST}" >> ~/.ssh/known_hosts

      - name: Get short SHA
        id: sha
        run: echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Sync files to VM
        env:
          VM_HOST: ${{ secrets.AZURE_VM_HOST }}
          VM_USER: ${{ secrets.AZURE_VM_USER }}
        run: |
          set -euo pipefail
          REMOTE_HOME=$(ssh -i ~/.ssh/id_rsa -p "${{ env.VM_PORT }}" "${VM_USER}@${VM_HOST}" 'printf %s "$HOME"')
          APP_DIR="${VM_APP_DIR:-${REMOTE_HOME}/CESIZen}"
          ssh -i ~/.ssh/id_rsa -p "${{ env.VM_PORT }}" "${VM_USER}@${VM_HOST}" "mkdir -p '${APP_DIR}'"
          
          rsync -az --no-times --no-perms --no-owner --no-group \
            -e "ssh -i ~/.ssh/id_rsa -p ${{ env.VM_PORT }} -o StrictHostKeyChecking=accept-new" \
            ./docker-compose.prod.yml ./traefik/ "${VM_USER}@${VM_HOST}:${APP_DIR}/"

      - name: Deploy to VM
        env:
          VM_HOST: ${{ secrets.AZURE_VM_HOST }}
          VM_USER: ${{ secrets.AZURE_VM_USER }}
          LETSENCRYPT_EMAIL: ${{ secrets.LETSENCRYPT_EMAIL }}
          SHORT_SHA: ${{ steps.sha.outputs.SHORT_SHA }}
        run: |
          set -euo pipefail
          REMOTE_HOME=$(ssh -i ~/.ssh/id_rsa -p "${{ env.VM_PORT }}" "${VM_USER}@${VM_HOST}" 'printf %s "$HOME"')
          APP_DIR="${VM_APP_DIR:-${REMOTE_HOME}/CESIZen}"
          ssh -i ~/.ssh/id_rsa -p "${{ env.VM_PORT }}" "${VM_USER}@${VM_HOST}" << ENDSSH
            set -euo pipefail
            cd "${APP_DIR}"
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            export BACKAPI_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/cesizen-backapi:sha-${SHORT_SHA}"
            export ADMIN_PANEL_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/cesizen-admin-panel:sha-${SHORT_SHA}"
            export LETSENCRYPT_EMAIL="${LETSENCRYPT_EMAIL}"
            docker compose -f docker-compose.prod.yml --env-file .env config
            docker compose -f docker-compose.prod.yml --env-file .env pull backapi admin-panel
            docker compose -f docker-compose.prod.yml --env-file .env up -d --remove-orphans
            docker image prune -f
          ENDSSH
