name: Deploy to Azure VM via GHCR

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository }}
  VM_USER: ${{ secrets.AZURE_VM_USER }}
  VM_HOST: ${{ secrets.AZURE_VM_HOST }}
  VM_PORT: ${{ secrets.AZURE_VM_PORT || '22' }}
  VM_APP_DIR: ${{ secrets.AZURE_APP_DIR || '/opt/CESIZen' }}
  GHCR_USERNAME: ${{ secrets.GHCR_USERNAME || github.actor }}
  GHCR_TOKEN: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}
  VITE_API_URL: ${{ vars.VITE_API_URL || 'http://api.localhost' }}

jobs:
  build-and-push:
    name: Build and push ${{ matrix.service }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backapi
            context: ./BackAPI
            file: ./BackAPI/Dockerfile
            image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/cesizen-backapi
            build_args: ""
          - service: admin-panel
            context: ./admin-panel
            file: ./admin-panel/Dockerfile
            image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/cesizen-admin-panel
            build_args: |
              VITE_API_URL=${{ env.VITE_API_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.GHCR_USERNAME }}
          password: ${{ env.GHCR_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=raw,value=latest
            type=ref,event=branch
            type=sha,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.build_args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      BACKAPI_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/cesizen-backapi:latest
      ADMIN_PANEL_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/cesizen-admin-panel:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare SSH access
        run: |
          set -euo pipefail

          if [[ -z "${VM_HOST}" || -z "${VM_USER}" ]]; then
            echo "AZURE_VM_HOST and AZURE_VM_USER secrets are required." >&2
            exit 1
          fi

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s' "${{ secrets.AZURE_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p "${VM_PORT}" "${VM_HOST}" >> ~/.ssh/known_hosts

      - name: Sync Compose file to the VM
        run: |
          set -euo pipefail

          rsync -az \
            -e "ssh -i ~/.ssh/id_rsa -p ${VM_PORT} -o StrictHostKeyChecking=accept-new" \
            ./docker-compose.prod.yml "${VM_USER}@${VM_HOST}:${VM_APP_DIR}/"

      - name: Deploy images on Azure VM
        run: |
          set -euo pipefail

          ssh -i ~/.ssh/id_rsa -p "${VM_PORT}" \
            -o StrictHostKeyChecking=accept-new \
            "${VM_USER}@${VM_HOST}" "
              set -euo pipefail
              cd '${VM_APP_DIR}'

              export BACKAPI_IMAGE='${BACKAPI_IMAGE}'
              export ADMIN_PANEL_IMAGE='${ADMIN_PANEL_IMAGE}'

              echo '${GHCR_TOKEN}' | docker login ${REGISTRY} -u '${GHCR_USERNAME}' --password-stdin
              docker compose -f docker-compose.prod.yml --env-file .env pull
              docker compose -f docker-compose.prod.yml --env-file .env up -d --remove-orphans

              healthy=0
              for attempt in {1..30}; do
                if curl -fsS http://localhost:3000/ >/dev/null; then
                  healthy=1
                  break
                fi
                sleep 2
              done

              if [[ \"\${healthy}\" != \"1\" ]]; then
                docker compose -f docker-compose.prod.yml --env-file .env ps
                exit 1
              fi

              docker compose -f docker-compose.prod.yml --env-file .env ps
              docker image prune -f
            "
